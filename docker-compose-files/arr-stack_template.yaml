version: '3.8'

# Synology DS920+ Compatible Configuration
# Note: CPU limits removed due to kernel lacking CPU CFS scheduler support
# Memory limits are supported and configured below

services:
  hawser:
    image: ghcr.io/finsys/hawser:latest
    container_name: hawser
    restart: unless-stopped
    labels:
      - "com.synology.stack=media"
      - "com.synology.service=hawser-agent"
    networks:
      - hawser-network
    ports:
      - "{{HAWSER_BIND_IP:-0.0.0.0}}:{{HAWSER_PORT:-2376}}:2376"
    environment:
      PORT: "2376"
      DOCKER_SOCKET: /var/run/docker.sock
      TOKEN: "{{HAWSER_TOKEN:-}}"
      AGENT_NAME: "{{HAWSER_AGENT_NAME:-synology-host}}"
      LOG_LEVEL: "{{HAWSER_LOG_LEVEL:-info}}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 32M
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-file: "{{DOCKERLOGGING_MAXFILE}}"
        max-size: "{{DOCKERLOGGING_MAXSIZE}}"

  gluetun:
    image: qmcgaw/gluetun:latest
    container_name: gluetun
    hostname: gluetun
    restart: unless-stopped
    labels:
      - "com.synology.stack=media"
      - "com.synology.service=vpn"
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    ports:
      - "8080:8080"     # qbittorrent WebUI
      - "8000:8000/tcp" # Gluetun WebUI
    networks:
      - vpn-network
    volumes:
      - {{DOCKERCONFDIR}}/gluetun:/gluetun
    environment:
      VPN_SERVICE_PROVIDER: {{VPN_SERVICE_PROVIDER:-airvpn}}
      VPN_TYPE: wireguard
      WIREGUARD_PRIVATE_KEY: {{WIREGUARD_PRIVATE_KEY}}
      WIREGUARD_PRESHARED_KEY: {{WIREGUARD_PRESHARED_KEY}}
      WIREGUARD_ADDRESSES: {{WIREGUARD_ADDRESSES}}
      FIREWALL_VPN_INPUT_PORTS: {{FIREWALL_VPN_INPUT_PORTS}}
      SERVER_COUNTRIES: {{SERVER_COUNTRIES}}
      UPDATER_PERIOD: 24h
      TZ: {{TZ}}
    healthcheck:
      test: ["CMD-SHELL", "ping -c 1 1.1.1.1 || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-file: "{{DOCKERLOGGING_MAXFILE}}"
        max-size: "{{DOCKERLOGGING_MAXSIZE}}"

  qbittorrent:
    image: ghcr.io/hotio/qbittorrent:latest
    container_name: qbittorrent
    # Use direct container network mode for better compatibility with single-service recreate flows
    # (for example Dockhand updates on Synology).
    network_mode: "container:gluetun"
    restart: unless-stopped
    labels:
      - "com.synology.stack=media"
      - "com.synology.service=torrent-client"
    environment:
      PUID: {{PUID}}
      PGID: {{PGID}}
      TZ: {{TZ}}
      WEBUI_PORTS: 8080/tcp,8080/udp
      UMASK: 002
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - {{DOCKERCONFDIR}}/qbittorrent:/config
      - {{DOCKERSTORAGEDIR}}/torrents:/data/torrents:rw
    depends_on:
      gluetun:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-file: "{{DOCKERLOGGING_MAXFILE}}"
        max-size: "{{DOCKERLOGGING_MAXSIZE}}"

  flaresolverr:
    image: flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    restart: unless-stopped
    labels:
      - "com.synology.stack=media"
      - "com.synology.service=captcha-solver"
    networks:
      - vpn-network
    ports:
      - "8191:8191"
    environment:
      PUID: {{PUID}}
      PGID: {{PGID}}
      TZ: {{TZ}}
      LOG_LEVEL: info
      CAPTCHA_SOLVER: none
      MAX_TIMEOUT: 60000
      BROWSER_TIMEOUT: 40000
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8191/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-file: "{{DOCKERLOGGING_MAXFILE}}"
        max-size: "{{DOCKERLOGGING_MAXSIZE}}"

  sabnzbd:
    image: ghcr.io/hotio/sabnzbd:latest
    container_name: sabnzbd
    restart: unless-stopped
    labels:
      - "com.synology.stack=media"
      - "com.synology.service=usenet-client"
    networks:
      - vpn-network
    ports:
      - "8282:8282"
    environment:
      PUID: {{PUID}}
      PGID: {{PGID}}
      TZ: {{TZ}}
      WEBUI_PORTS: 8282/tcp,8282/udp
      UMASK: 002
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - {{DOCKERCONFDIR}}/sabnzbd:/config
      - {{DOCKERSTORAGEDIR}}/usenet:/data/usenet:rw
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8282/api?mode=version || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-file: "{{DOCKERLOGGING_MAXFILE}}"
        max-size: "{{DOCKERLOGGING_MAXSIZE}}"

  prowlarr:
    image: ghcr.io/hotio/prowlarr:latest
    container_name: prowlarr
    restart: unless-stopped
    labels:
      - "com.synology.stack=media"
      - "com.synology.service=indexer-manager"
    networks:
      - vpn-network
    ports:
      - "9696:9696"
    environment:
      PUID: {{PUID}}
      PGID: {{PGID}}
      TZ: {{TZ}}
      UMASK: 002
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - {{DOCKERCONFDIR}}/prowlarr:/config:rw
    depends_on:
      flaresolverr:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9696/ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-file: "{{DOCKERLOGGING_MAXFILE}}"
        max-size: "{{DOCKERLOGGING_MAXSIZE}}"

  radarr:
    image: ghcr.io/hotio/radarr:latest
    container_name: radarr
    restart: unless-stopped
    labels:
      - "com.synology.stack=media"
      - "com.synology.service=movie-pvr"
    networks:
      - vpn-network
    ports:
      - "7878:7878"
    environment:
      PUID: {{PUID}}
      PGID: {{PGID}}
      TZ: {{TZ}}
      UMASK: 002
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - {{DOCKERCONFDIR}}/radarr:/config
      - {{DOCKERSTORAGEDIR}}:/data
    depends_on:
      prowlarr:
        condition: service_healthy
      gluetun:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:7878/ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-file: "{{DOCKERLOGGING_MAXFILE}}"
        max-size: "{{DOCKERLOGGING_MAXSIZE}}"

  sonarr:
    image: ghcr.io/hotio/sonarr:latest
    container_name: sonarr
    restart: unless-stopped
    labels:
      - "com.synology.stack=media"
      - "com.synology.service=tv-pvr"
    networks:
      - vpn-network
    ports:
      - "8989:8989"
    environment:
      PUID: {{PUID}}
      PGID: {{PGID}}
      TZ: {{TZ}}
      UMASK: 002
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - {{DOCKERCONFDIR}}/sonarr:/config
      - {{DOCKERSTORAGEDIR}}:/data
    depends_on:
      prowlarr:
        condition: service_healthy
      gluetun:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8989/ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-file: "{{DOCKERLOGGING_MAXFILE}}"
        max-size: "{{DOCKERLOGGING_MAXSIZE}}"

  bazarr:
    image: ghcr.io/hotio/bazarr:nightly
    container_name: bazarr
    restart: unless-stopped
    labels:
      - "com.synology.stack=media"
      - "com.synology.service=subtitle-manager"
    networks:
      - vpn-network
    ports:
      - "6767:6767"
    environment:
      PUID: {{PUID}}
      PGID: {{PGID}}
      TZ: {{TZ}}
      UMASK: 002
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - {{DOCKERCONFDIR}}/bazarr:/config
      - {{DOCKERSTORAGEDIR}}/media:/data/media
    depends_on:
      sonarr:
        condition: service_healthy
      radarr:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:6767/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-file: "{{DOCKERLOGGING_MAXFILE}}"
        max-size: "{{DOCKERLOGGING_MAXSIZE}}"

  emby:
    image: lscr.io/linuxserver/emby:latest
    container_name: emby
    restart: unless-stopped
    labels:
      - "com.synology.stack=media"
      - "com.synology.service=media-server"
    networks:
      - vpn-network
    ports:
      - "8096:8096"
    environment:
      PUID: {{PUID}}
      PGID: {{PGID}}
      TZ: {{TZ}}
      UMASK_SET: 022
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - {{DOCKERCONFDIR}}/emby:/config:rw
      - {{DOCKERSTORAGEDIR}}/media:/data/media:rw
    devices:
      - /dev/dri:/dev/dri
    group_add:
      - "937"
    healthcheck:
      test: ["CMD-SHELL", "timeout 1 bash -c '</dev/tcp/localhost/8096' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 180s
    deploy:
      resources:
        limits:
          memory: 3G # Reduced from 4G; 3G is plenty for a 128MB DB cache + OS overhead [cite: 73, 121]
        reservations:
          memory: 1G
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-file: "{{DOCKERLOGGING_MAXFILE}}"
        max-size: "{{DOCKERLOGGING_MAXSIZE}}"

  seerr:
    image: ghcr.io/seerr-team/seerr:latest
    container_name: seerr
    init: true
    restart: unless-stopped
    labels:
      - "com.synology.stack=media"
      - "com.synology.service=media-requests"
    networks:
      - vpn-network
    ports:
      - "5055:5055"
    environment:
      TZ: {{TZ}}
      PORT: 5055
      LOG_LEVEL: info
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - {{DOCKERCONFDIR}}/jellyseerr:/app/config
      - {{DOCKERSTORAGEDIR}}/media:/data/media
    depends_on:
      emby:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:5055/api/v1/status || exit 1"]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-file: "{{DOCKERLOGGING_MAXFILE}}"
        max-size: "{{DOCKERLOGGING_MAXSIZE}}"

  recyclarr:
    image: ghcr.io/recyclarr/recyclarr:v8.4.0
    container_name: recyclarr
    restart: unless-stopped
    labels:
      - "com.synology.stack=media"
      - "com.synology.service=arr-config-manager"
    networks:
      - vpn-network
    user: "{{PUID}}:{{PGID}}"
    environment:
      TZ: {{TZ}}
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - {{DOCKERCONFDIR}}/recyclarr:/config
    depends_on:
      radarr:
        condition: service_healthy
      sonarr:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-file: "{{DOCKERLOGGING_MAXFILE}}"
        max-size: "{{DOCKERLOGGING_MAXSIZE}}"

networks:
  vpn-network:
    driver: bridge
    name: vpn_network
    labels:
      - "com.synology.network=media"

  hawser-network:
    driver: bridge
    name: hawser_network
    labels:
      - "com.synology.network=hawser"
