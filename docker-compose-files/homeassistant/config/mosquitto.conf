# Eclipse Mosquitto 2.x configuration
# Mosquitto 2.0+ requires explicit listener configuration — no default listeners

# Persistence
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information

# MQTT listener (used by zigbee2mqtt, home assistant, etc.)
listener 1883
protocol mqtt
allow_anonymous true

# WebSocket listener (used by browser-based MQTT clients, Node-RED dashboard, etc.)
listener 9001
protocol websockets
allow_anonymous true

# To enable authentication, comment out allow_anonymous and configure:
# password_file /mosquitto/config/passwd
# Then create passwd with: docker exec mqtt mosquitto_passwd -c /mosquitto/config/passwd <username>
