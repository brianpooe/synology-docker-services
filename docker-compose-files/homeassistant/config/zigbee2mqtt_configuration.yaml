# Zigbee2MQTT configuration for SMLIGHT SLZB-06U (PoE+ / network mode)
# Place this file at: ./appdata/zigbee2mqtt/configuration.yaml
#
# NOTE: The setup script only copies this file on first-time setup.
# Changes here won't affect an existing install — edit the live file directly.

homeassistant:
  enabled: true

permit_join: false           # Set to true temporarily to pair new devices, then back to false

mqtt:
  base_topic: zigbee2mqtt
  # mqtt container is on the same ha-network bridge — use container name
  server: mqtt://mqtt:1883
  # If you enable MQTT auth (see mosquitto.conf), uncomment:
  # user: {{MQTT_USER}}
  # password: {{MQTT_PASSWORD}}

serial:
  # SLZB-06U connects over the network via TCP (PoE+ mode — no USB needed)
  # Assign a static IP or DHCP reservation to the coordinator for a stable address
  # Default coordinator TCP serial port is 6638
  port: tcp://{{SLZB06_HOST}}:6638
  adapter: zstack            # SLZB-06U uses TI CC2652 (zStack)

frontend:
  enabled: true
  port: 8080
  host: 0.0.0.0

advanced:
  log_level: info            # Options: debug, info, warn, error
  # pan_id: GENERATE         # Use GENERATE only on a brand new install with no paired devices
  pan_id: 535
  # network_key: GENERATE    # Use GENERATE only on a brand new install with no paired devices
  network_key:
    - 171
    - 127
    - 16
    - 221
    - 62
    - 152
    - 252
    - 121
    - 253
    - 41
    - 212
    - 246
    - 231
    - 154
    - 246
    - 29
  # channel: 11              # Zigbee channel (11-26). Avoid 15/20/25 — overlap with WiFi ch 1/6/11

version: 5

devices:
  '0xf044d3fffef98228':
    friendly_name: sonoffWirelessSwitch
  '0x54ef4410015ad84f':
    friendly_name: aqaraFp300sensor

# TROUBLESHOOTING: configuration-adapter mismatch on startup
# If Z2M fails with "Configuration is not consistent with adapter state/backup",
# the coordinator's actual state differs from what's in this file (e.g. after a
# coordinator firmware flash or accidental config replacement).
#
# To fix WITHOUT re-pairing devices, update pan_id and network_key to match the
# adapter's values from the error log:
#   "adapter:active=<hex>" — convert each byte pair to decimal.
#
# Alternative (destructive): delete coordinator_backup.json to re-commission
# the network using this config's values — requires re-pairing ALL devices.
