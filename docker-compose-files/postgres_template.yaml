version: '3.8'

services:
  postgres:
    image: postgres:17-alpine
    container_name: postgres
    restart: unless-stopped
    labels:
      - "com.synology.stack=database"
      - "com.synology.service=postgres"
    environment:
      TZ: {{TZ}}
      POSTGRES_USER: {{POSTGRES_USER}}
      POSTGRES_PASSWORD: {{POSTGRES_PASSWORD}}
      POSTGRES_DB: {{POSTGRES_DB}}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - {{DOCKERCONFDIR}}/postgres/data:/var/lib/postgresql/data
      - {{DOCKERCONFDIR}}/postgres/backups:/backups
    ports:
      - "5433:5432"
    networks:
      - postgres_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U {{POSTGRES_USER}} -d {{POSTGRES_DB}}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-file: "{{DOCKERLOGGING_MAXFILE}}"
        max-size: "{{DOCKERLOGGING_MAXSIZE}}"

  pgadmin:
    image: dpage/pgadmin4:9.2.0
    container_name: pgadmin
    restart: unless-stopped
    labels:
      - "com.synology.stack=database"
      - "com.synology.service=pgadmin"
    environment:
      TZ: {{TZ}}
      PGADMIN_DEFAULT_EMAIL: {{PGADMIN_EMAIL}}
      PGADMIN_DEFAULT_PASSWORD: {{PGADMIN_PASSWORD}}
      PGADMIN_LISTEN_PORT: 80
      PGADMIN_CONFIG_SERVER_MODE: 'True'
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: 'True'
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - {{DOCKERCONFDIR}}/pgadmin:/var/lib/pgadmin
    ports:
      - "8484:80"
    networks:
      - postgres_network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80/misc/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-file: "{{DOCKERLOGGING_MAXFILE}}"
        max-size: "{{DOCKERLOGGING_MAXSIZE}}"

networks:
  postgres_network:
    driver: bridge
    name: postgres_network
    labels:
      - "com.synology.network=database"