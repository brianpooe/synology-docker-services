# =====================================================================================
# Recyclarr Configuration - Merged for Single Instance per App
# =====================================================================================

sonarr:
  sonarr-main:
    base_url: http://sonarr:8989
    api_key: {{SONARR_API_KEY}}
    delete_old_custom_formats: true
    quality_definition:
      type: series
    quality_profiles:
      - trash_id: 72dae194fc92bf828f32cde7744e51a1
        name: WEB-1080p
        reset_unmatched_scores:
          enabled: true
      - trash_id: d1498e7d189fbe6c7110ceaabb7473e6
        name: WEB-2160p
        reset_unmatched_scores:
          enabled: true
    custom_formats:
      # Language: Not English (TRaSH). Reverse scoring to block non-English audio.
      # Source: https://trash-guides.info/Radarr/Tips/How-to-setup-language-custom-formats/
      - trash_ids:
          - 0dc8aec3bd1c47cd6c40c46ecd27e846
        assign_scores_to:
          - name: WEB-1080p
            score: -10000
          - name: WEB-2160p
            score: -10000

radarr:
  radarr-main:
    base_url: http://radarr:7878
    api_key: {{RADARR_API_KEY}}
    delete_old_custom_formats: true
    quality_definition:
      type: movie
    quality_profiles:
      - trash_id: 64fb5f9858489bdac2af690e27c8f42f
        name: UHD Bluray + WEB
        reset_unmatched_scores:
          enabled: true
      - trash_id: d1d67249d3890e49bc12e275d989a7e9
        name: HD Bluray + WEB
        reset_unmatched_scores:
          enabled: true
    custom_formats:
      # Language: Not English (TRaSH). Reverse scoring to block non-English audio.
      # Source: https://trash-guides.info/Radarr/Tips/How-to-setup-language-custom-formats/
      - trash_ids:
          - 0dc8aec3bd1c47cd6c40c46ecd27e846
        assign_scores_to:
          - name: UHD Bluray + WEB
            score: -10000
          - name: HD Bluray + WEB
            score: -10000
