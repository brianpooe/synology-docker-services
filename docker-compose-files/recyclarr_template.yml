# =====================================================================================
# Recyclarr Configuration - Merged for Single Instance per App
# =====================================================================================

sonarr:
  sonarr-main:
    base_url: http://sonarr:8989
    api_key: {{SONARR_API_KEY}}
    delete_old_custom_formats: true
    replace_existing_custom_formats: true
    include:
      - template: sonarr-quality-definition-series
      - template: sonarr-v4-quality-profile-web-1080p
      - template: sonarr-v4-custom-formats-web-1080p
      - template: sonarr-v4-quality-profile-web-2160p
      - template: sonarr-v4-custom-formats-web-2160p
    custom_formats:
      # Language: Not English (TRaSH). Reverse scoring to block non-English audio.
      # Source: https://trash-guides.info/Radarr/Tips/How-to-setup-language-custom-formats/
      - trash_ids:
          - 0dc8aec3bd1c47cd6c40c46ecd27e846
        assign_scores_to:
          - name: WEB-1080p
            score: -10000
          - name: WEB-2160p
            score: -10000

radarr:
  radarr-main:
    base_url: http://radarr:7878
    api_key: {{RADARR_API_KEY}}
    delete_old_custom_formats: true
    replace_existing_custom_formats: true
    include:
      - template: radarr-quality-definition-movie
      - template: radarr-quality-profile-uhd-bluray-web
      - template: radarr-custom-formats-uhd-bluray-web
      - template: radarr-quality-profile-hd-bluray-web
      - template: radarr-custom-formats-hd-bluray-web
    custom_formats:
      # Language: Not English (TRaSH). Reverse scoring to block non-English audio.
      # Source: https://trash-guides.info/Radarr/Tips/How-to-setup-language-custom-formats/
      - trash_ids:
          - 0dc8aec3bd1c47cd6c40c46ecd27e846
        assign_scores_to:
          - name: UHD Bluray + WEB
            score: -10000
          - name: HD Bluray + WEB
            score: -10000
