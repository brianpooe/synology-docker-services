version: '3.8'

# Synology DS920+ Compatible Configuration
# Note: CPU limits removed due to kernel lacking CPU CFS scheduler support
# Memory limits are supported and configured below

services:
  beszel-proxy:
    image: lscr.io/linuxserver/socket-proxy:{{BESZEL_SOCKET_PROXY_IMAGE_TAG:-latest}}
    container_name: beszel-proxy
    restart: unless-stopped
    labels:
      - "com.synology.stack=monitoring"
      - "com.synology.service=beszel-socket-proxy"
    ports:
      - "{{BESZEL_SOCKET_PROXY_BIND_IP:-127.0.0.1}}:{{BESZEL_SOCKET_PROXY_PORT:-2375}}:2375"
    environment:
      CONTAINERS: "1"
      POST: "0"
      ALLOW_RESTARTS: "0"
      ALLOW_STOP: "0"
      ALLOW_START: "0"
      AUTH: "0"
      BUILD: "0"
      COMMIT: "0"
      CONFIGS: "0"
      DISTRIBUTION: "0"
      EVENTS: "1"
      EXEC: "0"
      IMAGES: "0"
      INFO: "0"
      LOG_LEVEL: "{{BESZEL_SOCKET_PROXY_LOG_LEVEL:-info}}"
      NETWORKS: "0"
      NODES: "0"
      PING: "1"
      PLUGINS: "0"
      SECRETS: "0"
      SERVICES: "0"
      SESSION: "0"
      SOCKET_PATH: "/var/run/docker.sock"
      SWARM: "0"
      SYSTEM: "0"
      TASKS: "0"
      VERSION: "1"
      VOLUMES: "0"
      ALLOW_PAUSE: "0"
      ALLOW_UNPAUSE: "0"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    deploy:
      resources:
        limits:
          memory: "{{BESZEL_SOCKET_PROXY_MEM_LIMIT:-64m}}"
        reservations:
          memory: 16M
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-file: "{{DOCKERLOGGING_MAXFILE}}"
        max-size: "{{DOCKERLOGGING_MAXSIZE}}"
