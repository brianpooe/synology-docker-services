version: '3.8'

services:
  vault:
    image: hashicorp/vault:1.19.2
    container_name: vault
    restart: unless-stopped
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
      - "com.synology.stack=security"
      - "com.synology.service=secrets-manager"
    ports:
      - "8200:8200"
      - "8201:8201"
    environment:
      TZ: {{TZ}}
      VAULT_ADDR: https://0.0.0.0:8200
      VAULT_LOG_LEVEL: info
      VAULT_SKIP_VERIFY: "false"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - {{DOCKERCONFDIR}}/vault:/vault:rw
    cap_add:
      - IPC_LOCK
    command: vault server -config=/vault/config/vault.hcl
    networks:
      - vault_network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider https://localhost:8200/v1/sys/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-file: "{{DOCKERLOGGING_MAXFILE}}"
        max-size: "{{DOCKERLOGGING_MAXSIZE}}"

networks:
  vault_network:
    driver: bridge
    name: vault_network
    labels:
      - "com.synology.network=security"
